name: lylrv_db
services:
  db:
    image: postgres:17.7-alpine
    environment:
      POSTGRES_DB: lylrv_db
      POSTGRES_USER: lylrv_user
      POSTGRES_PASSWORD: lylrv_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 20 1 --loglevel warning --requirepass local_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "local_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:
